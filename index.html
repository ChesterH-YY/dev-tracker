<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Development Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #555;
  --color-text-tertiary: #999;
  --color-background-primary: #fff;
  --color-background-secondary: #f5f5f4;
  --color-border-tertiary: #e5e5e4;
  --color-border-secondary: #ccc;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-text-primary: #f0f0f0;
    --color-text-secondary: #aaa;
    --color-text-tertiary: #666;
    --color-background-primary: #1c1c1e;
    --color-background-secondary: #2c2c2e;
    --color-border-tertiary: #3a3a3c;
    --color-border-secondary: #555;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--color-background-secondary);color:var(--color-text-primary);min-height:100vh;}
.page{max-width:780px;margin:0 auto;padding:1.5rem 1rem;}
.crm-wrap{padding:1rem 0;}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;padding-right:144px;position:relative;}
.top-bar h2{font-size:18px;font-weight:500;color:var(--color-text-primary);flex:1;}
.btn-add{display:flex;align-items:center;gap:5px;padding:7px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;}
.btn-add:hover{background:var(--color-background-secondary);}
.btn-io{display:flex;align-items:center;gap:4px;padding:6px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;}
.btn-io:hover{background:var(--color-background-secondary);}
.btn-io-export{border-color:var(--color-border-tertiary);}
.btn-io-import{border-color:var(--color-border-tertiary);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:99px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.search-bar{padding:8px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);width:168px;}
.filter-section{margin-bottom:1.25rem;}
.filter-group{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.filter-group-label{font-size:12px;color:var(--color-text-secondary);min-width:56px;}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);font-size:11px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .12s;user-select:none;}
.filter-chip .dot{width:7px;height:7px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;}
.filter-chip.checked .dot{background:currentColor;}
.chip-all.checked{background:#EEEDFE;color:#3C3489;border-color:#3C3489;}
#status-chips,#priority-chips,#devtype-chips,#duerange-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.mini-select{padding:5px 12px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1.25rem;}
.stat-card{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center;border:0.5px solid var(--color-border-tertiary);}
.stat-num{font-size:19px;font-weight:500;color:var(--color-text-primary);}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.customer-list{display:flex;flex-direction:column;gap:10px;}
.customer-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;}
.customer-card.has-followup{border-color:#E05252;}
.customer-card.is-overdue{border-left:3px solid #B3261E;}
.customer-card.is-due-soon{border-left:3px solid #E65100;}
.card-header{display:flex;align-items:center;gap:10px;padding:.9rem 1.25rem;cursor:pointer;user-select:none;}
.card-header:hover{background:var(--color-background-secondary);}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;position:relative;}
.avatar-dot{position:absolute;top:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#E05252;border:2px solid var(--color-background-primary);}
.card-meta{flex:1;min-width:0;}
.card-name{font-size:15px;font-weight:500;color:var(--color-text-primary);}
.card-company{font-size:12px;color:var(--color-text-secondary);}
.card-log-preview{font-size:12.5px;color:var(--color-text-secondary);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px;line-height:1.35;}
.card-log-preview.urgent{color:#C0392B;font-weight:500;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.card-badges{display:flex;gap:5px;align-items:center;}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap;}
.card-last{font-size:11px;color:var(--color-text-tertiary);}
.card-last.overdue-text{color:#B3261E;font-weight:600;}
.card-last.due-soon-text{color:#E65100;font-weight:600;}
.card-body{display:none;border-top:0.5px solid var(--color-border-tertiary);padding:1rem 1.25rem;}
.card-body.open{display:block;}
.section-label{font-size:12px;color:var(--color-text-secondary);font-weight:500;margin-bottom:8px;margin-top:14px;}
.section-label:first-child{margin-top:0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:6px;font-size:13px;}
.info-item{color:var(--color-text-secondary);}
.info-item strong{color:var(--color-text-primary);font-weight:500;}
.info-item-block{color:var(--color-text-secondary);margin-bottom:6px;line-height:1.5;font-size:12px;}
.info-item-block strong{color:var(--color-text-primary);font-weight:500;display:block;margin-top:2px;font-size:12px;}
.status-grid{display:flex;gap:6px;flex-wrap:wrap;}
.status-btn,.priority-btn{padding:4px 12px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);font-size:12px;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .12s;}
.status-btn.sel,.priority-btn.sel{border-color:transparent;font-weight:500;}
.log-entry{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;background:var(--color-background-secondary);}
.log-entry.today-followup{border-color:#E05252;background:#FFF5F5;}
.log-view{display:flex;gap:10px;align-items:flex-start;}
.log-date-badge{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;padding-top:2px;min-width:82px;display:flex;align-items:center;gap:4px;}
.log-date-badge .red-dot{width:7px;height:7px;border-radius:50%;background:#E05252;flex-shrink:0;display:inline-block;}
.log-text-display{flex:1;font-size:14px;color:var(--color-text-primary);line-height:1.6;word-break:break-word;}
.log-actions{display:flex;gap:4px;flex-shrink:0;}
.log-icon-btn{background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px;font-size:15px;color:var(--color-text-tertiary);line-height:1;}
.log-icon-btn:hover{color:var(--color-text-primary);}
.log-icon-btn.del:hover{color:#A32D2D;}
.log-edit-form{display:none;margin-top:8px;}
.log-edit-form.open{display:block;}
.log-edit-textarea{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);resize:vertical;min-height:60px;font-family:var(--font-sans);}
.log-edit-date{padding:6px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);}
.log-edit-row{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap;}
.btn-save-log{padding:5px 14px;border:none;border-radius:var(--border-radius-md);background:#3C3489;color:#EEEDFE;font-size:12px;cursor:pointer;font-weight:500;}
.btn-cancel-log{padding:5px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer;}
.add-log-row{display:flex;gap:8px;margin-top:8px;}
.log-input{flex:1;padding:7px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-secondary);color:var(--color-text-primary);}
.btn-log{padding:7px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);}
.btn-log:hover{background:var(--color-background-secondary);}
.log-hint{font-size:11px;color:var(--color-text-tertiary);margin-top:5px;}
.btn-log-toggle{display:block;width:100%;text-align:center;padding:7px;border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer;margin-bottom:8px;}
.btn-log-toggle:hover{background:var(--color-background-secondary);}
.card-footer{display:flex;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:0.5px solid var(--color-border-tertiary);gap:6px;}
.btn-edit-c{padding:5px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-secondary);}
.btn-edit-c:hover{background:var(--color-background-secondary);}
.btn-del-c{padding:5px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-tertiary);}
.btn-del-c:hover{color:#A32D2D;border-color:#A32D2D;}
.empty{text-align:center;padding:3rem;color:var(--color-text-tertiary);font-size:14px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.5rem;width:380px;max-width:92vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans);}
.field textarea{resize:vertical;min-height:52px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;}
.btn-confirm{flex:1;padding:9px;border:none;border-radius:var(--border-radius-md);background:#3C3489;color:#EEEDFE;font-size:14px;cursor:pointer;font-weight:500;}
.btn-cancel{flex:1;padding:9px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);font-size:14px;cursor:pointer;}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:14px 0;}
.auth-screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:14px;}
.auth-screen h2{font-size:20px;font-weight:500;color:var(--color-text-primary);}
.auth-screen p{font-size:14px;color:var(--color-text-secondary);max-width:320px;line-height:1.6;}
.btn-google{display:flex;align-items:center;gap:10px;padding:10px 20px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;}
.btn-google:hover{background:var(--color-background-secondary);}
.user-bar{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--color-text-secondary);position:absolute;top:50%;right:0;transform:translateY(-50%);}
.btn-signout{padding:5px 9px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);font-size:11.5px;cursor:pointer;white-space:nowrap;}
.btn-signout:hover{background:var(--color-background-secondary);}

/* ─── Mobile responsive ─── */
@media (max-width: 640px) {
  input, select, textarea { font-size: 16px !important; }
  .page{padding:1rem 0.75rem;}
  .top-bar{gap:8px;padding-right:0;}
  .top-bar h2{font-size:16px;width:100%;}
  .search-bar{flex:1;min-width:0;width:auto;}
  .btn-io span,.btn-io{font-size:12px;padding:7px 10px;}
  .btn-add{padding:7px 12px;font-size:13px;}
  .user-bar{position:static;width:100%;justify-content:flex-end;margin-top:4px;}
  .filter-group{gap:6px;}
  .filter-group-label{width:100%;min-width:0;margin-bottom:2px;}
  .filter-chip{font-size:11px;padding:3px 8px;}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:6px;}
  .stat-card{padding:8px 8px;}
  .stat-num{font-size:16px;}
  .card-header{padding:.8rem 1rem;flex-wrap:wrap;}
  .card-meta{min-width:0;flex-basis:calc(100% - 46px);}
  .card-log-preview{font-size:12px;max-width:100%;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-right{flex-direction:row;align-items:center;justify-content:space-between;width:100%;margin-top:6px;flex-wrap:wrap;gap:6px;}
  .card-body{padding:0.85rem 1rem;}
  .info-grid{grid-template-columns:1fr;}
  .status-grid{gap:5px;}
  .status-btn,.priority-btn{font-size:11px;padding:4px 10px;}
  .log-text-display{font-size:14px;}
  .log-date-badge{min-width:64px;font-size:11px;}
  .add-log-row{flex-direction:column;}
  .btn-log{width:100%;}
  .modal{width:92vw;padding:1.25rem;}
  .card-footer{flex-wrap:wrap;}
}
@media (max-width: 400px) {
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .card-log-preview{font-size:12px;}
  .card-name{font-size:14px;}
}
/* Larger tap targets on touch devices */
@media (pointer: coarse) {
  .status-btn,.priority-btn,.filter-chip{min-height:32px;display:inline-flex;align-items:center;}
  .log-icon-btn{padding:6px 8px;font-size:18px;}
  input[type="checkbox"]{width:18px;height:18px;}
}
.view-tabs{display:flex;gap:4px;padding:0 1.5rem;margin-top:10px;border-bottom:0.5px solid var(--color-border-secondary);}
.view-tab{border:none;background:none;padding:9px 14px;font-size:14px;font-weight:500;color:var(--color-text-tertiary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.view-tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);}
</style>
</head>
<body>

<div id="login-screen" class="auth-screen">
  <i class="ti ti-lock" style="font-size:40px;color:var(--color-text-tertiary)"></i>
  <h2>Development Tracker</h2>
  <p>請使用 Google 帳號登入以檢視與編輯開發追蹤資料</p>
  <button class="btn-google" onclick="signInWithGoogle()"><i class="ti ti-brand-google"></i> 使用 Google 登入</button>
</div>

<div id="unauthorized-screen" class="auth-screen">
  <i class="ti ti-shield-x" style="font-size:40px;color:#A32D2D"></i>
  <h2>沒有存取權限</h2>
  <p>你的帳號（<span id="unauthorized-email"></span>）不在授權名單內，請聯絡管理員新增權限。</p>
  <button class="btn-signout" onclick="signOutUser()">登出，改用其他帳號</button>
</div>

<div class="page" id="app-page" style="display:none">
<div class="crm-wrap">
<div class="top-bar">
  <h2><i class="ti ti-clipboard-list" style="font-size:20px;vertical-align:-3px;margin-right:6px"></i>Development Tracker</h2>
  <input class="search-bar" type="text" placeholder="搜尋 Brand / Article# / Developer..." id="search" oninput="render()">
  <button class="btn-io btn-io-export" onclick="exportData()"><i class="ti ti-download"></i> 匯出</button>
  <button class="btn-io btn-io-import" id="btn-import" onclick="document.getElementById('import-file').click()"><i class="ti ti-upload"></i> 匯入</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  <button class="btn-add" id="btn-add-dev" onclick="openModal()"><i class="ti ti-plus"></i> 新增</button>
  <div class="user-bar"><i class="ti ti-user-circle" style="font-size:16px"></i><span id="user-email-display"></span><button class="btn-signout" onclick="signOutUser()">登出</button></div>
</div>
<div id="toast" class="toast"></div>
<div class="view-tabs">
  <button class="view-tab active" id="tab-dev" onclick="switchView('dev')">開發項目</button>
  <button class="view-tab" id="tab-feedback" onclick="switchView('feedback')">品牌回饋</button>
</div>
<div id="dev-view">
<div class="filter-section">
  <div class="filter-group">
    <span class="filter-group-label">開發狀態</span>
    <label class="filter-chip chip-all" id="chip-all" onclick="toggleAll()"><span class="dot"></span>全部</label>
    <span id="status-chips"></span>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">優先度</span>
    <span id="priority-chips"></span>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">品牌</span>
    <select class="mini-select" id="brand-filter" onchange="syncChips();render()"><option value="">全部品牌</option></select>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">建立者</span>
    <select class="mini-select" id="creator-filter" onchange="syncChips();render()"><option value="">全部建立者</option></select>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">開發類型</span>
    <span id="devtype-chips"></span>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">交期</span>
    <span id="duerange-chips"></span>
  </div>
</div>
<div class="stats-row" id="stats-row"></div>
<div class="customer-list" id="customer-list"></div>
</div>

<div id="feedback-view" style="display:none">
<div class="filter-section">
  <div class="filter-group">
    <span class="filter-group-label">狀態</span>
    <label class="filter-chip chip-all" id="fchip-all" onclick="toggleFeedbackAll()"><span class="dot"></span>全部</label>
    <span id="feedback-status-chips"></span>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">品牌</span>
    <select class="mini-select" id="feedback-brand-filter" onchange="syncFeedbackChips();renderFeedback()"><option value="">全部品牌</option></select>
  </div>
  <div class="filter-group">
    <button class="btn-add" id="btn-add-feedback" onclick="openFeedbackModal()"><i class="ti ti-plus"></i> 新增回饋</button>
  </div>
</div>
<div class="stats-row" id="feedback-stats-row"></div>
<div class="customer-list" id="feedback-list-el"></div>
</div>

<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">新增項目</h3>
    <div class="field"><label>Brand *</label><input id="f-brand" type="text" placeholder="Brand 品牌名稱"></div>
    <div class="field"><label>Development Type</label>
      <select id="f-devtype">
        <option value="">— 未設定 —</option>
        <option value="客指開發">客指開發</option>
        <option value="自主開發">自主開發</option>
        <option value="概念驗證">概念驗證</option>
        <option value="Sourcing">Sourcing</option>
      </select>
    </div>
    <div class="field"><label>Developer</label><input id="f-developer" type="text" placeholder="開發人員"></div>
    <div class="field"><label>Request</label><textarea id="f-request" rows="2" placeholder="需求內容"></textarea></div>
    <div class="field"><label>Family</label><input id="f-family" type="text" placeholder="系列 / Family"></div>
    <div class="field"><label>Season</label><input id="f-season" type="text" placeholder="季節，如 SS27"></div>
    <div class="field"><label>Article#</label><input id="f-article" type="text" placeholder="布號 / 料號"></div>

function daysUntil(dateStr){if(!dateStr)return null;const d=new Date(dateStr+'T00:00:00');const t=new Date(TODAY+'T00:00:00');return Math.round((d-t)/86400000);}
function isOverdue(c){const du=daysUntil(c.dueDate);return du!==null&&du<0&&c.status!=='完成'&&c.status!=='取消';}
function isDueSoon(c){const du=daysUntil(c.dueDate);return du!==null&&du>=0&&du<=7&&c.status!=='完成'&&c.status!=='取消';}

function logMatchesToday(text){
  const[ty,tm,td]=TODAY.split('-');
  const patterns=[/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/g,/\d{1,2}[-\/]\d{1,2}/g];
  for(const re of patterns){
    const matches=text.match(re)||[];
    for(const m of matches){
      const parts=m.split(/[-\/]/);
      if(parts.length===3){const[y,mo,d]=[parts[0].padStart(4,'0'),parts[1].padStart(2,'0'),parts[2].padStart(2,'0')];if(y===ty&&mo===tm&&d===td)return true;}
      else if(parts.length===2){const[mo,d]=[parts[0].padStart(2,'0'),parts[1].padStart(2,'0')];if(mo===tm&&d===td)return true;}
    }
  }
  return false;
}
function hasFollowupToday(c){return c.logs&&c.logs.some(l=>logMatchesToday(l.text));}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function exportData(){
  const data=JSON.stringify(customers,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download='dev_tracker_backup_'+date+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('✓ 已匯出 '+customers.length+' 筆資料');
}

function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result);
      if(!Array.isArray(imported))throw new Error('格式錯誤');
      const existingIds=new Set(customers.map(c=>c.id));
      let added=0,updated=0;
      const ops=[];
      imported.forEach(c=>{
        if(!c.brand)return;
        const {id,...rest}=c;
        if(id&&existingIds.has(id)){
          ops.push(itemsRef.doc(id).update(rest).then(()=>updated++).catch(err=>showToast('✗ 更新「'+(rest.article||rest.brand)+'」失敗：'+err.message)));
        } else {
          if(!rest.logs)rest.logs=[];
          if(!rest.createdBy)rest.createdBy=currentUserEmail;
          ops.push(itemsRef.add(rest).then(()=>added++).catch(err=>showToast('✗ 新增「'+(rest.article||rest.brand)+'」失敗：'+err.message)));
        }
      });
      Promise.all(ops).then(()=>{
        showToast('✓ 匯入完成：新增 '+added+' 筆，更新 '+updated+' 筆');
      }).catch(err=>showToast('✗ 匯入時發生錯誤：'+err.message));
    }catch(err){
      showToast('✗ 匯入失敗，請確認是正確的備份檔案');
    }
    event.target.value='';
  };
  reader.readAsText(file);
}

function render(){
  buildBrandOptions();
  buildCreatorOptions();
  const q=document.getElementById('search').value.toLowerCase();
  const brandVal=document.getElementById('brand-filter').value;
  const creatorVal=document.getElementById('creator-filter').value;
  let list=customers.filter(c=>{
    if(activeStatuses.size&&!activeStatuses.has(c.status))return false;
    if(activePriorities.size&&!activePriorities.has(c.priority))return false;
    if(brandVal&&c.brand!==brandVal)return false;
    if(creatorVal&&c.createdBy!==creatorVal)return false;
    if(activeDevTypes.size&&!activeDevTypes.has(c.devType))return false;
    if(activeDueRanges.size){
      const numRanges=[...activeDueRanges].filter(v=>typeof v==='number');
      const wantsOverdue=activeDueRanges.has('overdue');
      const du=daysUntil(c.dueDate);
      let dueMatch=false;
      if(du!==null){
        if(numRanges.length&&du>=0&&du<=Math.max(...numRanges))dueMatch=true;
        if(wantsOverdue&&du<0)dueMatch=true;
      }
      if(!dueMatch)return false;
    }
    if(q){
      const hay=[c.brand,c.article,c.developer,c.devType,c.request,c.family,c.season,c.cw,c.knitter,c.yarn].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  list.sort((a,b)=>{
    const f=(hasFollowupToday(b)?1:0)-(hasFollowupToday(a)?1:0);
    if(f!==0)return f;
    const da=daysUntil(a.dueDate),db=daysUntil(b.dueDate);
    const da2=da===null?Infinity:da,db2=db===null?Infinity:db;
    if(da2!==db2)return da2-db2;
    const pa=PRIORITIES.indexOf(a.priority),pb=PRIORITIES.indexOf(b.priority);
    const pa2=pa===-1?PRIORITIES.length:pa,pb2=pb===-1?PRIORITIES.length:pb;
    return pa2-pb2;
  });
  const byStatus={};STATUSES.forEach(s=>byStatus[s]=0);list.forEach(c=>byStatus[c.status]=(byStatus[c.status]||0)+1);
  document.getElementById('stats-row').innerHTML=`<div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">項目數</div></div>${STATUSES.filter(s=>byStatus[s]).map(s=>`<div class="stat-card"><div class="stat-num">${byStatus[s]}</div><div class="stat-label">${s}</div></div>`).join('')}`;
  const el=document.getElementById('customer-list');
  if(!list.length){el.innerHTML='<div class="empty"><i class="ti ti-clipboard-off" style="font-size:32px;display:block;margin-bottom:8px"></i>沒有符合的項目</div>';return;}
  el.innerHTML=list.map(c=>{
    const[abg,atxt]=avatarColors(c.brand),isOpen=openCardId===c.id,latestLog=c.logs&&c.logs.length?c.logs[0]:null,followup=hasFollowupToday(c);
    const sc=statusColor(c.status);
    const pc=c.priority?priorityColor(c.priority):null;
    const overdue=isOverdue(c);
    const dueSoon=!overdue&&isDueSoon(c);
    const lockIcon=canEdit(c)?'':'<i class="ti ti-lock" style="font-size:13px;color:var(--color-text-tertiary);margin-left:4px" title="唯讀"></i>';
    return`<div class="customer-card${followup?' has-followup':''}${overdue?' is-overdue':''}${dueSoon?' is-due-soon':''}" id="card-${c.id}"><div class="card-header" onclick="toggleCard('${c.id}')"><div class="avatar" style="background:${abg};color:${atxt}">${(c.brand||'—').slice(0,2)}${followup?'<span class="avatar-dot"></span>':''}</div><div class="card-meta"><div class="card-name">${c.article||'—'}</div><div class="card-company">${c.brand}</div>${latestLog?`<div class="card-log-preview${followup&&logMatchesToday(latestLog.text)?' urgent':''}"><i class="ti ti-message" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>${latestLog.date} ${latestLog.text}</div>`:''}</div><div class="card-right"><div class="card-badges"><span class="badge" style="background:${sc.bg};color:${sc.fg}">${c.status}</span>${pc?`<span class="badge" style="background:${pc.bg};color:${pc.fg}">${c.priority}</span>`:''}</div><span class="card-last${overdue?' overdue-text':''}${dueSoon?' due-soon-text':''}">${overdue?'<i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:2px"></i>':''}${dueSoon?'<i class="ti ti-clock" style="font-size:12px;vertical-align:-1px;margin-right:2px"></i>':''}${c.dueDate||''}</span></div>${lockIcon}<i class="ti ti-chevron-${isOpen?'up':'down'}" style="font-size:16px;color:var(--color-text-tertiary);margin-left:4px"></i></div><div class="card-body" id="body-${c.id}"></div></div>`;
  }).join('');
  list.forEach(c=>{if(openCardId===c.id)renderCardBody(c.id);});
}

function saveFeedback(){
  if(isReadOnly(currentUserEmail)){showToast('✗ 唯讀帳號無法新增或編輯');closeFeedbackModal();return;}
  const brand=document.getElementById('fb-brand').value.trim();if(!brand){document.getElementById('fb-brand').focus();return;}
  if(editingFeedbackId){
    const existing=feedbackList.find(x=>x.id===editingFeedbackId);
    if(existing && !canEditFeedback(existing)){showToast('✗ 你沒有權限編輯這筆資料');closeFeedbackModal();return;}
  }
  const data={
    brand,
    receivedDate:document.getElementById('fb-date').value,
    subject:document.getElementById('fb-subject').value.trim(),
    issue:document.getElementById('fb-issue').value.trim(),
    reply:document.getElementById('fb-reply').value.trim(),
    status:document.getElementById('fb-status').value,
    linkedArticle:document.getElementById('fb-linked-article').value,
    updatedAt:TODAY
  };
  if(editingFeedbackId){
    feedbackRef.doc(editingFeedbackId).update(data).catch(err=>showToast('✗ 更新失敗：'+err.message));
  } else {
    feedbackRef.add({createdBy:currentUserEmail,...data}).catch(err=>showToast('✗ 新增失敗：'+err.message));
  }
  closeFeedbackModal();
}
function deleteFeedback(id){
  const f=feedbackList.find(x=>x.id===id);
  if(f&&!canEditFeedback(f)){showToast('✗ 你沒有權限刪除這筆資料');return;}
  if(openFeedbackCardId===id)openFeedbackCardId=null;
  feedbackRef.doc(id).delete().catch(err=>showToast('✗ 刪除失敗：'+err.message));
}

      const ro=isReadOnly(user.email);
      const addDevBtn=document.getElementById('btn-add-dev');if(addDevBtn)addDevBtn.style.display=ro?'none':'';
      const importBtn=document.getElementById('btn-import');if(importBtn)importBtn.style.display=ro?'none':'';
      const addFbBtn=document.getElementById('btn-add-feedback');if(addFbBtn)addFbBtn.style.display=ro?'none':'';
      attachFirestoreListener();
      attachFeedbackListener();
    }
  });
}
</script>
